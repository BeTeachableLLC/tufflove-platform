name: tufflove-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tufflove}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tufflove}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tufflove} -d ${POSTGRES_DB:-tufflove}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tufflove}:${POSTGRES_PASSWORD:-change_me_postgres}@postgres:5432/${POSTGRES_DB:-tufflove}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change_me}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://app.tufflove.us}
      GHL_CLIENT_ID: ${GHL_CLIENT_ID:-}
      GHL_CLIENT_SECRET: ${GHL_CLIENT_SECRET:-}
      GHL_REDIRECT_URI: ${GHL_REDIRECT_URI:-https://app.tufflove.us/api/ghl/callback}
      GHL_TOKEN_URL: ${GHL_TOKEN_URL:-https://services.leadconnectorhq.com/oauth/token}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-60}
      DB_CONNECT_DELAY_SEC: ${DB_CONNECT_DELAY_SEC:-1}
      TRIGGER_DAILY_CAP: ${TRIGGER_DAILY_CAP:-250}
    volumes:
      - runtime_data:/var/lib/tufflove/runtime
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tufflove}:${POSTGRES_PASSWORD:-change_me_postgres}@postgres:5432/${POSTGRES_DB:-tufflove}
      REDIS_URL: redis://redis:6379/0
      WORKER_ADMIN_TOKEN: ${WORKER_ADMIN_TOKEN:-change_me_worker}
      ALLOW_RUN_FOREVER: "false"
      INGEST_ROOT: /var/lib/tufflove/runtime
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-60}
      DB_CONNECT_DELAY_SEC: ${DB_CONNECT_DELAY_SEC:-1}
      MAX_TASK_SECONDS: ${MAX_TASK_SECONDS:-20}
    volumes:
      - runtime_data:/var/lib/tufflove/runtime
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=2)\""]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  worker-runner:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.run_forever"]
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tufflove}:${POSTGRES_PASSWORD:-change_me_postgres}@postgres:5432/${POSTGRES_DB:-tufflove}
      REDIS_URL: redis://redis:6379/0
      INGEST_ROOT: /var/lib/tufflove/runtime
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-60}
      DB_CONNECT_DELAY_SEC: ${DB_CONNECT_DELAY_SEC:-1}
      MAX_TASK_SECONDS: ${MAX_TASK_SECONDS:-20}
      WORKER_RUN_FOREVER_BLOCK_SECONDS: ${WORKER_RUN_FOREVER_BLOCK_SECONDS:-5}
    volumes:
      - runtime_data:/var/lib/tufflove/runtime
      - ./assets:/app/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  trigger-scheduler:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.trigger_scheduler"]
    environment:
      ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-tufflove}:${POSTGRES_PASSWORD:-change_me_postgres}@postgres:5432/${POSTGRES_DB:-tufflove}
      REDIS_URL: redis://redis:6379/0
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change_me}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-60}
      DB_CONNECT_DELAY_SEC: ${DB_CONNECT_DELAY_SEC:-1}
      TRIGGER_DAILY_CAP: ${TRIGGER_DAILY_CAP:-250}
      TRIGGER_SCHEDULER_INTERVAL_SEC: ${TRIGGER_SCHEDULER_INTERVAL_SEC:-30}
      TRIGGER_SCHEDULER_DUE_LIMIT: ${TRIGGER_SCHEDULER_DUE_LIMIT:-50}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: apps/tufflove-web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_AGENT_API_URL: ${NEXT_PUBLIC_AGENT_API_URL:-http://api:8080}
      AGENT_ADMIN_TOKEN: ${ADMIN_TOKEN:-change_me}
      FAMILYOPS_ADMIN_EMAILS: ${FAMILYOPS_ADMIN_EMAILS:-}
      FAMILYOPS_ADMIN_PASSWORD: ${FAMILYOPS_ADMIN_PASSWORD:-}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET:-}
      APP_AUTH_SESSION_TTL_SECONDS: ${APP_AUTH_SESSION_TTL_SECONDS:-43200}
      WORKER_API_URL: ${WORKER_API_URL:-http://worker:8081}
      WORKER_ADMIN_TOKEN: ${WORKER_ADMIN_TOKEN:-change_me_worker}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://app.tufflove.us}
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/sign-in').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  runtime_data:
