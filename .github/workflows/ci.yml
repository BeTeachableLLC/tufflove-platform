name: TUFF LOVE CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web-checks:
    name: Web lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tufflove-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/tufflove-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint agent surfaces
        run: npx eslint app/agent/AgentClient.tsx app/agent-test/AgentTestClient.tsx src/lib/agentClient.ts

      - name: Build web app
        run: npm run build

  python-regressions:
    name: Worker + API regressions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install worker dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/worker/requirements.txt

      - name: Install local zeroclaw and API dependencies
        run: |
          python -m pip install -e packages/zeroclaw
          python -m pip install -r services/api/requirements.txt

      - name: Worker guardrail tests
        working-directory: services/worker
        run: python -m unittest -v tests.test_publish_guardrails

      - name: API auth regression tests
        working-directory: services/api
        run: PYTHONPATH='../../packages/zeroclaw' python -m unittest -v tests.test_sprint4_auth_regression

